type Query {
  getUserByID(ID: ID!): User!
  me: User
  myDecks: [Deck!]!
  browse(parentSetId: ID): BrowseResult!
  deck(id: ID!, offset: Int, limit: Int): Deck
  quizQuestions(deckId: ID!, offset: Int, limit: Int, seed: Int): QuizPage!
  quizQuestionsForSet(setId: ID!, offset: Int, limit: Int, seed: Int): QuizPage!
}

type Mutation {
  signUp(username: String!, password: String!): AuthResult!
  login(username: String!, password: String!): AuthResult!
  refreshSession: AuthResult!
  logout: Boolean!
  uploadApkg(fileContent: String!, shuffle: Boolean): Int!
  deleteDeck(id: ID!): Boolean!
  deleteDeckSet(id: ID!): Boolean!
}

type User {
  ID: ID!
  username: String!
}

type AuthResult {
  accessToken: String!
  User: User!
}

type DeckSet {
  id: ID!
  name: String!
  createdAt: String!
  parentId: ID
  childSetCount: Int!
  deckCount: Int!
  totalCardCount: Int!
}

type BrowseResult {
  sets: [DeckSet!]!
  decks: [Deck!]!
}

type Deck {
  id: ID!
  name: String!
  createdAt: String!
  cardCount: Int!
  cards: [Card!]!
}

type Card {
  id: ID!
  front: String!
  back: String!
  position: Int!
}

type QuizPage {
  questions: [QuizQuestion!]!
  totalCards: Int!
}

type QuizQuestion {
  cardId: ID!
  front: String!
  options: [QuizOption!]!
  correctOptionId: ID!
}

type QuizOption {
  id: ID!
  text: String!
}