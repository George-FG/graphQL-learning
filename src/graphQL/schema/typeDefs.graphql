type Query {
  getUserByID(ID: ID!): User!
  me: User
}

type Mutation {
  signUp(username: String!, password: String!, numFish: Int!): AuthResult!
  login(username: String!, password: String!): AuthResult!
  refreshSession: AuthResult!
  logout: Boolean!
}

type User {
  ID: ID!
  username: String!
  numFish: Int
}

type AuthResult {
  accessToken: String!
  User: User!
}