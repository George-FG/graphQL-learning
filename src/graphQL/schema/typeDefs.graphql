type Query {
  getUserByID(ID: ID!): User!
  me: User
  myDecks: [Deck!]!
  deck(id: ID!): Deck
}

type Mutation {
  signUp(username: String!, password: String!): AuthResult!
  login(username: String!, password: String!): AuthResult!
  refreshSession: AuthResult!
  logout: Boolean!
  uploadDeck(name: String!, fileContent: String!): Deck!
  deleteDeck(id: ID!): Boolean!
}

type User {
  ID: ID!
  username: String!
}

type AuthResult {
  accessToken: String!
  User: User!
}

type Deck {
  id: ID!
  name: String!
  createdAt: String!
  cardCount: Int!
  cards: [Card!]!
}

type Card {
  id: ID!
  front: String!
  back: String!
  position: Int!
}