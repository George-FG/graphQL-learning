type Query {
  getUserByID(ID: ID!): User!
  me: User
  journeyGraph(start: String!, end: String!): JourneyGraph!
}

type Mutation {
  signUp(username: String!, password: String!): AuthResult!
  login(username: String!, password: String!): AuthResult!
  refreshSession: AuthResult!
  logout: Boolean!
}

type User {
  ID: ID!
  username: String!
}

type AuthResult {
  accessToken: String!
  User: User!
}

type JourneyGraph {
  start: String!
  end: String!
  nodes: [LocationNode!]!
  edges: [TransportEdge!]!
}

type LocationNode {
  id: ID!
  name: String!
}

type TransportEdge {
  id: ID!
  source: ID!
  target: ID!
  label: String!
}