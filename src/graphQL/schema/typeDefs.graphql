type Query {
  getUserByID(ID: ID!): User!
  me: User
}

type Mutation {
  signUp(username: String!, password: String!): AuthResult!
  login(username: String!, password: String!): AuthResult!
  refreshSession: AuthResult!
  logout: Boolean!
}

type User {
  ID: ID!
  username: String!
}

type AuthResult {
  accessToken: String!
  User: User!
}

type Location {
  id: ID!
  name: String!
  lat: Float
  lng: Float
  type: String
}

type Connection {
  id: ID!
  fromId: ID!
  toId: ID!
  transportType: String
  routeId: String
  routeName: String
  duration: Int
}

type JourneyGraph {
  start: Location!
  end: Location!
  nodes: [Location!]!
  edges: [Connection!]!
  route: JourneyRoute!
}

type JourneyRoute {
  nodes: [Location!]!
  edges: [Connection!]!
  totalDuration: Int
}

extend type Query {
  searchLocations(query: String!): [Location!]!
  journeyGraph(startId: ID!, endId: ID!): JourneyGraph!
}