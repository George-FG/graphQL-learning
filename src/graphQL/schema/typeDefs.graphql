type Query {
  getUserByID(ID: ID!): User!
  me: User
  myDecks: [Deck!]!
  browse(parentSetId: ID): BrowseResult!
  deck(id: ID!, offset: Int, limit: Int): Deck
  quizQuestions(deckId: ID!, offset: Int, limit: Int, seed: Int): QuizPage!
  quizQuestionsForSet(setId: ID!, offset: Int, limit: Int, seed: Int): QuizPage!
  examHistory(deckId: ID, setId: ID, period: String): [ExamSessionSummary!]!
  examSessionDetail(id: ID!): ExamSessionDetail
  examAggregate(deckId: ID, setId: ID, period: String): ExamAggregate!
  cardQuestion(cardId: ID!): QuizQuestion
}

type Mutation {
  signUp(username: String!, password: String!): AuthResult!
  login(username: String!, password: String!): AuthResult!
  refreshSession: AuthResult!
  logout: Boolean!
  uploadApkg(fileContent: String!, shuffle: Boolean): Int!
  deleteDeck(id: ID!): Boolean!
  deleteDeckSet(id: ID!): Boolean!
  startExamSession(deckId: ID, setId: ID, seed: Int, totalCards: Int!): ID!
  recordExamAnswer(sessionId: ID!, cardId: ID!, front: String!, wasCorrect: Boolean!, timeSecs: Int!, selectedOptionId: ID): Boolean!
}

type User {
  ID: ID!
  username: String!
}

type AuthResult {
  accessToken: String!
  User: User!
}

type DeckSet {
  id: ID!
  name: String!
  createdAt: String!
  parentId: ID
  childSetCount: Int!
  deckCount: Int!
  totalCardCount: Int!
}

type BrowseResult {
  sets: [DeckSet!]!
  decks: [Deck!]!
}

type Deck {
  id: ID!
  name: String!
  createdAt: String!
  cardCount: Int!
  cards: [Card!]!
}

type Card {
  id: ID!
  front: String!
  back: String!
  position: Int!
}

type QuizPage {
  questions: [QuizQuestion!]!
  totalCards: Int!
}

type QuizQuestion {
  cardId: ID!
  front: String!
  options: [QuizOption!]!
  correctOptionId: ID!
}

type QuizOption {
  id: ID!
  text: String!
}

# ── Exam history ──────────────────────────────────────────────────

type ExamSessionSummary {
  id: ID!
  createdAt: String!
  totalCards: Int!
  answeredCount: Int!
  correctCount: Int!
  pctCorrect: Float!
  avgTimeSecs: Float!
  isRandom: Boolean!
  sourceName: String!
}

type ExamAnswerDetail {
  cardId: ID
  front: String!
  wasCorrect: Boolean!
  timeSecs: Int!
  selectedOptionId: ID
}

type ExamSessionDetail {
  id: ID!
  createdAt: String!
  totalCards: Int!
  answeredCount: Int!
  correctCount: Int!
  pctCorrect: Float!
  avgTimeSecs: Float!
  isRandom: Boolean!
  sourceName: String!
  answers: [ExamAnswerDetail!]!
}

type AggregatedAnswer {
  cardId: ID
  front: String!
  wasCorrect: Boolean!
  timeSecs: Int!
  sessionDate: String!
  selectedOptionId: ID
}

type ExamAggregate {
  totalAnswered: Int!
  correctCount: Int!
  pctCorrect: Float!
  avgTimeSecs: Float!
  sessionCount: Int!
  answers: [AggregatedAnswer!]!
}